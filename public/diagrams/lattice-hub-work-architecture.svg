<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
<title id="title">Lattice Hub 首页工作架构</title>
<desc id="desc">三列结构展示变更入口、Lattice Hub 控制面，以及 thin SDK、local proxy 和 proxy mesh 组成的轻量运行时接入层。</desc>
<defs>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#dbe5f7" stroke-width="1" opacity="0.52"/></pattern>
<linearGradient id="blue" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2457ff"/><stop offset="1" stop-color="#66a2ff"/></linearGradient>
<marker id="arrow-head" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/></marker>
<marker id="event-head" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/></marker>
<marker id="catalog-head" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#7c3aed"/></marker>
</defs>
<style>
text{font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:0}.bg{fill:#f7faff}.grid{fill:url(#grid)}.title{fill:#0b1020;font-size:25px;font-weight:820}.caption{fill:#5f6b7d;font-size:13px}.col-title{fill:#0b1020;font-size:17px;font-weight:780}.col-sub{fill:#64748b;font-size:12px}.node{fill:#ffffff;stroke:#d7e2f3;stroke-width:1.2}.node-strong{fill:#eef5ff;stroke:#9cbcff;stroke-width:1.4}.node-title{fill:#0b1020;font-size:14px;font-weight:760}.node-sub{fill:#65748a;font-size:12px}.control{fill:#f8fbff;stroke:#adc4f8;stroke-width:1.5}.control-head{fill:url(#blue)}.control-title{fill:#ffffff;font-size:19px;font-weight:820}.lane{fill:#ffffff;stroke:#d7e2f3;stroke-width:1.1}.lane-title{fill:#0b1020;font-size:15px;font-weight:760}.tag{fill:#f5f8ff;stroke:#cddbf4;stroke-width:1}.tag-text{fill:#18305f;font-size:12px;font-weight:680}.arrow{fill:none;stroke:#2563eb;stroke-width:2.2}.event{fill:none;stroke:#64748b;stroke-width:1.8;stroke-dasharray:6 5}.catalog{fill:none;stroke:#7c3aed;stroke-width:2}.label-bg{fill:#f7faff;stroke:#dbe5f7;stroke-width:1}.arrow-label{fill:#334155;font-size:12px;font-weight:680}.hub-label{fill:#3156a7;font-size:12px;font-weight:760}</style>
<rect class="bg" width="1280" height="560"/>
<rect class="grid" width="1280" height="560"/>
<circle cx="1048" cy="62" r="188" fill="#dbe7ff" opacity="0.58"/>
<text x="48" y="48" class="title" text-anchor="start">Lattice Hub 工作架构</text>
<text x="48" y="73" class="caption" text-anchor="start">控制面生成治理视图，客户端保持轻量；执行层由 SDK + proxy / sidecar / proxy mesh 承担。</text>
<text x="70" y="125" class="col-title" text-anchor="start">入口与变更源</text>
<text x="70" y="148" class="col-sub" text-anchor="start">事实写入与外部同步</text>
<text x="1000" y="125" class="col-title" text-anchor="start">客户端轻量接入层</text>
<text x="1000" y="148" class="col-sub" text-anchor="start">thin SDK + proxy / mesh 执行治理</text>
<rect x="70" y="178" width="230" height="70" rx="0" class="node"/>
<text x="88" y="208" class="node-title" text-anchor="start">Console / API</text>
<text x="88" y="233" class="node-sub" text-anchor="start">服务、配置、治理发布</text>
<rect x="70" y="278" width="230" height="70" rx="0" class="node"/>
<text x="88" y="308" class="node-title" text-anchor="start">Kubernetes Controller</text>
<text x="88" y="333" class="node-sub" text-anchor="start">Service 同步、Sidecar 注入</text>
