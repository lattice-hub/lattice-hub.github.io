<text x="650.0" y="98" text-anchor="middle" class="label">CacheManager</text>
<text x="830.0" y="98" text-anchor="middle" class="label">Runtime</text>
<text x="200.0" y="131.0" text-anchor="middle" class="note">change</text>
<text x="380.0" y="167.0" text-anchor="middle" class="note">validate</text>
<text x="560.0" y="203.0" text-anchor="middle" class="note">refresh</text>
