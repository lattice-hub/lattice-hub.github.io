<text x="812.0" y="92" text-anchor="middle" class="label">Service Registry</text>
<text x="812.0" y="112" text-anchor="middle" class="sub">service + instance</text>
<text x="812.0" y="174" text-anchor="middle" class="label">Traffic Rules</text>
